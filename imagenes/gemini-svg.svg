<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="100%" height="100%">
  <!-- Isotipo: El Procesador de Rendimiento -->
  <g fill="#000000">
    <rect x="20" y="20" width="80" height="80" rx="4" />
    <!-- Líneas diagonales en corte negativo (Blancas) -->
    <path d="M45 15 L30 105 L38 105 L53 15 Z" fill="#ffffff" />
    <path d="M60 15 L45 105 L53 105 L68 15 Z" fill="#ffffff" />
    <path d="M75 15 L60 105 L68 105 L83 15 Z" fill="#ffffff" />
  </g>

  <!-- Texto Principal Integrado -->
  <text x="125" y="68" font-family="'Segoe UI', 'Arial Black', sans-serif" font-size="34" font-weight="900" letter-spacing="3" fill="#000000">GAMIN</text>
  
  <!-- Barras de Separación Estilo Código -->
  <text x="265" y="66" font-family="'Segoe UI', sans-serif" font-size="32" font-weight="300" fill="#767677">//</text>
  
  <!-- Segundo Texto -->
  <text x="310" y="68" font-family="'Segoe UI', 'Arial Black', sans-serif" font-size="34" font-weight="900" letter-spacing="3" fill="#000000">SHOP</text>
  
  <!-- Subtexto Técnico Opcional Cortado con Precisión -->
  <text x="127" y="90" font-family="'Segoe UI', sans-serif" font-size="11" font-weight="700" letter-spacing="5.5" fill="#767677">EXTREME PERFORMANCE</text>
</svg>
